<!DOCTYPE html>
<html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MON AIRHORN ONLINE</title>
<style>*{box-sizing:border-box}body{margin:0;font-family:Arial;background:#0d0d0d;color:#fff}.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px;background:linear-gradient(135deg,#000,#251a00)}.card,.panel{background:#171717;border:1px solid #333;border-radius:16px;padding:18px;margin:14px 0}.card{width:min(440px,100%)}h1{text-align:center;color:#f6b21a}input,button,select{width:100%;padding:13px;margin:8px 0;border-radius:10px;font-size:15px}input,select{background:#090909;color:white;border:1px solid #444}button{background:#f6b21a;border:0;font-weight:bold}.blue{background:#1e88e5;color:white}.gray{background:#333;color:white}.green{background:#28a745;color:white}.app{display:none;max-width:1100px;margin:auto;padding:18px}.msg{white-space:pre-line;color:#ff8080;text-align:center}.ok{white-space:pre-line;color:#9eff9e}.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}.out{background:#242424;border:1px solid #444;border-radius:10px;padding:10px;text-align:center}.out.active{background:#f6b21a;color:#111}@media(max-width:760px){.grid{grid-template-columns:repeat(3,1fr)}}</style></head>
<body><div class="login" id="loginBox"><div class="card"><h1>MON AIRHORN</h1><p style="text-align:center;color:#bbb">Masukkan kode akses. 1 kode maksimal 2 HP.</p><input id="code" placeholder="Kode akses, contoh MON-0001" style="text-transform:uppercase"><input id="pin" type="password" placeholder="PIN akses"><button class="blue" onclick="login()">MASUK</button><button onclick="buy()">BELI KODE VIA WHATSAPP</button><div id="msg" class="msg"></div></div></div>
<div class="app" id="app"><h1>MON AIRHORN ONLINE</h1><div class="panel"><h3>Status Akses</h3><div id="status" class="ok"></div><button class="gray" onclick="logout()">LOGOUT</button></div><div class="panel"><h3>Playlist MIDI Online</h3><select id="playlist"><option>Memuat playlist...</option></select><button class="blue" onclick="loadMidi()">LOAD MIDI</button><button class="green" onclick="playDemo()">TEST OUTPUT SIMULASI</button><div id="midiStatus" class="ok"></div></div><div class="panel"><h3>Output Modul 24 Channel</h3><div class="grid" id="grid"></div></div></div>
<script>
const WA_NUMBER="088219915904";
function deviceId(){let id=localStorage.getItem("mon_device_id");if(!id){id="DEV-"+Math.random().toString(36).slice(2,10).toUpperCase()+"-"+Date.now().toString(36).toUpperCase();localStorage.setItem("mon_device_id",id)}return id}
function buy(){window.open("https://wa.me/62"+WA_NUMBER.replace(/^0/,"").replace(/\D/g,"")+"?text="+encodeURIComponent("Halo admin, saya mau beli kode akses MON AIRHORN."),"_blank")}
async function login(){const msg=document.getElementById("msg"),code=(document.getElementById("code").value||"").trim().toUpperCase(),pin=document.getElementById("pin").value||"";if(!code||!pin){msg.innerText="Isi kode dan PIN.";return}msg.innerText="Mengecek akses...";try{const res=await fetch("/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({code,pin,deviceId:deviceId(),userAgent:navigator.userAgent})});const d=await res.json();if(!d.ok){msg.innerText=d.message||"Login gagal";return}localStorage.setItem("mon_session",JSON.stringify(d.user));showApp(d.user)}catch(e){msg.innerText="Error: "+e.message}}
function showApp(u){loginBox.style.display="none";app.style.display="block";status.innerText="Kode: "+u.code+"\nNama: "+(u.name||"-")+"\nExpired: "+(u.expired||"-")+"\nDevice: "+deviceId();loadPlaylist();renderGrid()}
function logout(){localStorage.removeItem("mon_session");location.reload()}
async function loadPlaylist(){try{const list=await fetch("/midi/manifest.json?t="+Date.now()).then(r=>r.json());playlist.innerHTML="";list.forEach(m=>{let o=document.createElement("option");o.value=m.file;o.textContent=m.name;playlist.appendChild(o)});if(!list.length)playlist.innerHTML="<option>Belum ada MIDI</option>"}catch(e){playlist.innerHTML="<option>Playlist gagal</option>"}}
function loadMidi(){midiStatus.innerText="MIDI siap: /midi/"+playlist.value+"\nEngine suara/tester bisa digabungkan setelah login stabil."}
function renderGrid(){grid.innerHTML="";for(let i=1;i<=24;i++){let d=document.createElement("div");d.className="out";d.id="out"+i;d.innerHTML="<b>OUT "+i+"</b><br>Channel "+i;grid.appendChild(d)}}
function playDemo(){let i=1,t=setInterval(()=>{document.querySelectorAll(".out").forEach(x=>x.classList.remove("active"));let el=document.getElementById("out"+i);if(el)el.classList.add("active");i++;if(i>24){clearInterval(t);setTimeout(()=>document.querySelectorAll(".out").forEach(x=>x.classList.remove("active")),300)}},120)}
const s=localStorage.getItem("mon_session");if(s)try{showApp(JSON.parse(s))}catch(e){}
</script></body></html>
